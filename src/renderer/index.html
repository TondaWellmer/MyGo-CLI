<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' wss://www.google.com https://www.google.com; img-src 'self' data: blob:; media-src 'self' mediastream:">
  <title>MyGo-CLI</title>
  <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="opencode-chat.css">
  <link rel="stylesheet" href="skills-panel.css">
  <link rel="stylesheet" href="settings/settings.css">
</head>
<body>
  <div id="app">
    <div id="titlebar">
        <!-- Editable Instance Name -->
      <div id="instance-name-wrapper">
        <span id="instance-name" title="Double-click to rename">MyGo-CLI</span>
        <input type="text" id="instance-name-input" style="display:none">
      </div>

      <!-- Spacer pushes right side items -->
      <div class="titlebar-spacer"></div>

      <!-- CWD Dropdown -->
      <div id="cwd-wrapper">
        <button id="cwd-button">
          <span id="cwd-label">Antigravity-Projects</span>
          <span id="cwd-arrow" class="hidden">▾</span>
        </button>
        <div id="cwd-dropdown" class="hidden">
          <!-- Populated dynamically -->
        </div>
      </div>

      <!-- Chat Button -->
      <button id="chat-btn" class="titlebar-icon-btn active" data-tooltip="Chat (Free + Premium Models)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>

      <!-- Terminal Button -->
      <button id="terminal-btn" class="titlebar-icon-btn" data-tooltip="Terminal">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      </button>

      <!-- Session ID Copy Button + History Dropdown -->
      <div id="session-wrapper">
        <button id="session-btn" class="hidden titlebar-icon-btn" data-tooltip="Copy Session ID">
          <span class="session-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>
        </button>
        <button id="session-history-btn" class="titlebar-icon-btn" data-tooltip="Session History">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <div id="session-dropdown" class="hidden">
          <div class="session-dropdown-tabs">
            <button class="session-tab active" data-session-tab="history">Session History</button>
            <button class="session-tab" data-session-tab="worksessions">Work Sessions</button>
          </div>
          <div id="session-tab-history" class="session-tab-panel active">
            <div class="session-history-toolbar">
              <button id="session-history-add" title="Aktuelle Session-ID zur History hinzufügen">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
            <div id="session-list">
              <div class="empty-state">No sessions yet</div>
            </div>
          </div>
          <div id="session-tab-worksessions" class="session-tab-panel">
            <div class="worksession-toolbar">
              <button id="worksession-add" title="Aktuelle Tabs als Work Session speichern">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <button id="worksession-recover" title="Aktuelle Work Session wiederherstellen">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
              </button>
            </div>
            <div id="worksession-list">
              <div class="empty-state">Keine Work Sessions</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Settings Button (ganz rechts, nach Session) -->
      <button id="settings-btn" class="titlebar-icon-btn" data-tooltip="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <div id="main">
      <div id="terminal-container">
        <!-- Multi-Tab Strip — right side, vertical -->
        <div id="term-tab-strip">
          <div id="term-tabs">
            <div class="term-tab active" data-tab-id="tab-0">
              <span class="term-tab-color" style="background:#212121"></span>
            </div>
            <div class="term-tab" data-tab-id="tab-1">
              <span class="term-tab-color" style="background:#605062"></span>
            </div>
            <div class="term-tab" data-tab-id="tab-2">
              <span class="term-tab-color" style="background:#354744"></span>
            </div>
            <div class="term-tab" data-tab-id="tab-3">
              <span class="term-tab-color" style="background:#181933"></span>
            </div>
          </div>
          <button id="term-tab-add" title="Neues Tab (+)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div id="terminal"></div>
        <button id="refresh-btn" title="Reload window (Ctrl+Shift+R)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
        <button id="shot-btn" title="Save text shot (Ctrl+H)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          <span class="shot-label"></span>
        </button>
        <!-- Color wheel for per-tab background color -->
        <div id="color-wheels">
          <div id="color-wheel-wrapper"><div id="color-dot"></div><input type="color" id="color-picker" value="#efefeb"></div>
          <div id="text-color-wheel-wrapper" style="display:none"><div id="text-color-dot"></div><input type="color" id="text-color-picker" value="#2a2a30"></div>
        </div>
        <div id="input-wrapper">
          <div id="attachment-preview"></div>
          <div id="input-row">
            <div id="attach-actions">
              <button id="attach-btn" title="Attach file">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                </svg>
              </button>
              <button id="attach-history-btn" title="Recent attachments">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </button>
              <div id="attach-history-dropdown" class="hidden">
                <div class="dropdown-header">Recent attachments</div>
                <div id="attach-history-list">
                  <div class="empty-state">No attachments yet</div>
                </div>
              </div>
            </div>
            <textarea id="input-bar" autocomplete="off" spellcheck="false"
              placeholder="Type here or use Wispr Flow — Enter to send"></textarea>
          </div>
          <input type="file" id="file-input" multiple accept="image/*,application/pdf,.txt,.md,.json,.csv,.log" style="display:none">
        </div>
      </div>
      <div id="divider" class="hidden"></div>
      <!-- Sidebar Toggle — small round button at right edge -->
      <button id="sidebar-toggle" title="Sidebar ein/ausklappen">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      </button>
      <div id="sidebar" class="collapsed">
        <div id="sidebar-tabs">
          <button class="tab active" data-tab="projects" title="Ordner"><svg class="tab-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg></button>
          <button class="tab" data-tab="pinned" title="Pint"><svg class="tab-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 11V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v7"/><path d="M5 11h14l-1.5 6h-11z"/></svg></button>
          <button class="tab" data-tab="auto" title="Auto"><svg class="tab-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg></button>
        </div>
        <div id="sidebar-content">
          <div id="tab-projects" class="tab-panel active">
            <div class="empty-state">Loading projects...</div>
          </div>
          <div id="tab-pinned" class="tab-panel">
            <div class="empty-state">No pinned items</div>
          </div>
          <div id="tab-auto" class="tab-panel">
            <div class="empty-state">Waiting for Claude...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../../dist/terminal.bundle.js"></script>
  <script src="../../dist/sidebar.bundle.js"></script>
  <script src="../../dist/titlebar.bundle.js"></script>
</body>
</html>
